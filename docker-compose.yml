services:
  postgres:
    image: postgres:16-alpine
    container_name: factus-mcp-db
    environment:
      POSTGRES_USER: factus
      POSTGRES_PASSWORD: factus
      POSTGRES_DB: factus_mcp
    ports:
      - '5433:5432'
    volumes:
      - factus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U factus -d factus_mcp']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: factus-mcp-redis
    ports:
      - '6379:6379'
    volumes:
      - factus_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  factus_pgdata:
  factus_redisdata:
